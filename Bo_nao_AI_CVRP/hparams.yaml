batch_size: 512
val_batch_size: null
test_batch_size: null
train_data_size: 100000
val_data_size: 10000
test_data_size: 10000
optimizer: Adam
optimizer_kwargs:
  lr: 5.0e-05
lr_scheduler: null
lr_scheduler_kwargs:
  milestones:
  - 80
  - 95
  gamma: 0.1
lr_scheduler_interval: epoch
lr_scheduler_monitor: val/reward
generate_default_data: false
shuffle_train_dataloader: false
dataloader_num_workers: 0
data_dir: data/
log_on_step: true
metrics:
  train:
  - reward
  - loss
  - surrogate_loss
  - value_loss
  - entropy
critic: null
critic_kwargs: {}
clip_range: 0.2
ppo_epochs: 2
mini_batch_size: 0.25
vf_lambda: 0.5
entropy_lambda: 0.0
normalize_adv: false
max_grad_norm: 0.5
